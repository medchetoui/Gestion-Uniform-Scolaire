{% extends 'base.html' %}

{% block title %}Page Non Trouvée — SchoolUniforms{% endblock %}

{% block content %}
<div class="text-center py-5" style="min-height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center;">
    <h1 class="display-1 fw-bold" style="color: var(--primary-color); font-size: 8rem;">404</h1>
    <h3 class="fw-bold mb-3">Page non trouvée</h3>
    <p class="text-muted mb-4" style="max-width: 400px;">
        La page que vous cherchez n'existe pas ou a été déplacée.
    </p>
    <div class="d-flex gap-3">
        <a href="{% url 'home' %}" class="btn btn-primary rounded-pill px-4">
            <i class="fas fa-home me-1"></i> Accueil
        </a>
        <a href="{% url 'dashboard' %}" class="btn btn-outline-primary rounded-pill px-4">
            <i class="fas fa-chart-pie me-1"></i> Dashboard
        </a>
    </div>
</div>
{% endblock %}
